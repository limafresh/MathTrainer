<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<link rel="stylesheet" href="styles.css">
		<link rel="icon" type="image/png" href="assets/icon.png">
		<title>Math trainer</title>
	</head>
	<body>
		<select id="select" onmousedown="return false" onclick="openSidebar()">
			<option value="0">Addition within 100</option>
			<option value="1">Multiplication within 10</option>
			<option value="2">Addition within 1000</option>
		</select>
		<div id="sidebar">
			<button id="closeSidebarBtn" onclick="closeSidebar()">&times;</button>
			<button class="sidebarOption" id="add100" onclick="setAdditionWithin100()">Addition within 100</button>
			<button class="sidebarOption" id="multiplication10" onclick="setMultiplicationWithin10()">Multiplication within 10</button>
			<button class="sidebarOption" id="add1000" onclick="setAdditionWithin1000()">Addition within 1000</button>
		</div>
		<div id="overlay" onclick="closeSidebar()"></div>
		<p id="example">2+2=</p>
		<input id="inputField" placeholder="Enter the answer..." type="text">
		<button id="checkButton" onclick="checkExample()">CHECK</button>
		<button id="skipButton" onclick="skipExample()">Skip this example</button>
		<div id="counters">
			<p id="skippedExamples">Skipped examples:</p>
			<p id="solvedExamples">Solved examples:</p>
			<p id="mistakes">Mistakes:</p>
		</div>
		<div class="notification" id="correctly">Correctly</div>
		<div class="notification" id="wrongly">Wrongly</div>
		<audio id="correctlySound" preload="auto">
			<source src="assets/bell.wav"
			type="audio/wav">
		</audio>
		<audio id="wronglySound" preload="auto">
			<source src="assets/losetrumpet.wav"
			type="audio/wav">
		</audio>
		<script src="script.js"></script>
	</body>
</html>
