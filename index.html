<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<link rel="stylesheet" href="styles.css">
		<link rel="icon" type="image/png" href="icon.png">
		<title>Math trainer</title>
	</head>
	<body>
		<select id="select">
			<option id="add100" value="0">Addition within 100</option>
			<option id="multiplication10" value="1">Multiplication within 10</option>
			<option id="add1000" value="2">Addition within 1000</option>
		</select>
		<p id="example">2+2=</p>
		<input id="inputField" placeholder="Enter the answer..." type="text">
		<button id="checkButton" onclick="checkExample()">CHECK</button>
		<button id="skipButton" onclick="skipExample()">Skip this example</button>
		<div id="counters">
			<p id="skippedExamples">Skipped examples:</p>
			<p id="solvedExamples">Solved examples:</p>
			<p id="mistakes">Mistakes:</p>
		</div>
		<div class="notification" id="correctly">Correctly</div>
		<div class="notification" id="wrongly">Wrongly</div>
		<audio id="correctlySound" preload="auto">
			<source src="sounds/bell.wav"
			type="audio/wav">
		</audio>
		<audio id="wronglySound" preload="auto">
			<source src="sounds/losetrumpet.wav"
			type="audio/wav">
		</audio>
		<script src="script.js"></script>
	</body>
</html>
